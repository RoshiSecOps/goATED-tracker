name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  tests:
    name: Unit and Format Tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Run Unit Tests
        run: go test ./...

      - name: Run Code Coverage
        run: go test ./... -cover

      - name: Run Go Formatting checker
        run: test -z $(go fmt ./...)
        
  code-quality:
    name: Linting and Security
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"
      
      - name: Install tooling
        run: go install honnef.co/go/tools/cmd/staticcheck@latest && go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Linting
        run: staticcheck ./...
        continue-on-error: true

      - name: SAST
        run: gosec ./...
        continue-on-error: true

      - name: Dependency Scanning
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

  container-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          soft_fail: true