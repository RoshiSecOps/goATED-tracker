services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: goated
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: goated
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goated"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .docker.env
    ports:
      - "8080:8080"

volumes:
  pgdata: